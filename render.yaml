services:
  - type: web
    name: orbitx-astra-backend
    runtime: node
    plan: free
    buildCommand: npm ci --prefix server
    startCommand: npm --prefix server start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NANOBANANA_API_URL
        value: https://generativelanguage.googleapis.com
      - key: NANOBANANA_MODEL
        value: gemini-2.5-flash-image
      - key: NANOBANANA_TIMEOUT_MS
        value: "30000"
